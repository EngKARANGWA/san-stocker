services:
  - type: web
    name: san-stocker-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: "10"
      - key: PORT
        value: "3000"
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PHONE
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_FIRST_NAME
        value: Cyrille
      - key: SUPER_ADMIN_LAST_NAME
        value: Karangwa
